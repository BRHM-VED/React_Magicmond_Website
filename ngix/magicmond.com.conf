# ============================================================
# MagicMond Website — Nginx Configuration
# Project: ReactMagicmondWebsite
# Location on VPS: /Production/ReidiusInfra/ReactMagicmondWebsite/ngix/magicmond.com.conf
# Target Symlink: /etc/nginx/sites-available/magicmond-website -> /Production/ReidiusInfra/ReactMagicmondWebsite/ngix/magicmond.com.conf
# ============================================================

server {
    server_name magicmond.com www.magicmond.com;

    root /Production/ReidiusInfra/ReactMagicmondWebsite/dist;
    index index.html;

    # Gzip Compression Settings
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # Single Page Application (SPA) Fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Static Assets (JS / CSS)
    location ~* \.(js|css)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Media & Font Files
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, no-transform";
    }

    # SSL Configuration (Managed by Certbot)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/magicmond.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magicmond.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP to HTTPS 301 Redirect Server Block
server {
    if ($host = www.magicmond.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = magicmond.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name magicmond.com www.magicmond.com;
    return 404;
}
